name: Validate
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS Validation
        uses: hacs/action@main
        with:
          category: integration
  validate-hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: hassfest Validation
        uses: home-assistant/actions/hassfest@master
